<svg width="1100" height="700" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">

<!-- Title -->
<text x="20" y="25" font-size="18">2S LiPo Protection Circuit (Clean, Non-overlapping)</text>

<!-- ========== BATTERY ========== -->
<rect x="80" y="100" width="60" height="80" fill="none" stroke="black"></rect>
<rect x="80" y="220" width="60" height="80" fill="none" stroke="black"></rect>

<circle cx="110" cy="80" r="3" fill="red"></circle>
<text x="120" y="85">B+</text>

<circle cx="110" cy="200" r="3" fill="black"></circle>
<text x="120" y="205">BM</text>

<circle cx="110" cy="320" r="3" fill="blue"></circle>
<text x="120" y="325">B-</text>

<!-- vertical battery -->
<line x1="110" y1="80" x2="110" y2="100" stroke="red"></line>
<line x1="110" y1="180" x2="110" y2="200" stroke="black"></line>
<line x1="110" y1="300" x2="110" y2="320" stroke="blue"></line>

<!-- ========== MOSFET ========== -->
<rect x="700" y="120" width="120" height="80" fill="none" stroke="black"></rect>
<text x="710" y="155">8205A</text>

<!-- Positive path -->
<line x1="110" y1="80" x2="500" y2="80" stroke="red"></line>
<line x1="500" y1="80" x2="500" y2="160" stroke="red"></line>
<line x1="500" y1="160" x2="700" y2="160" stroke="red"></line>

<line x1="820" y1="160" x2="1000" y2="160" stroke="red"></line>
<text x="1010" y="165">P+</text>

<!-- ========== NEGATIVE PATH ========== -->
<rect x="700" y="300" width="60" height="20" fill="none" stroke="black"></rect>
<text x="705" y="315">Rsense</text>

<line x1="110" y1="320" x2="500" y2="320" stroke="blue"></line>
<line x1="500" y1="320" x2="500" y2="310" stroke="blue"></line>
<line x1="500" y1="310" x2="700" y2="310" stroke="blue"></line>

<line x1="760" y1="310" x2="1000" y2="310" stroke="blue"></line>
<text x="1010" y="315">P-</text>

<!-- ========== PROTECTION IC ========== -->
<rect x="300" y="400" width="200" height="150" fill="none" stroke="black"></rect>
<text x="310" y="420">U1 (2S Protection IC)</text>

<!-- pins -->
<text x="310" y="450">VDD</text>
<text x="310" y="470">VM</text>
<text x="310" y="490">VSS</text>
<text x="310" y="510">CS</text>

<text x="450" y="450">DO</text>
<text x="450" y="470">CO</text>

<!-- VDD -->
<line x1="110" y1="80" x2="250" y2="80" stroke="red"></line>
<line x1="250" y1="80" x2="250" y2="450" stroke="red"></line>
<line x1="250" y1="450" x2="300" y2="450" stroke="red"></line>

<!-- VM -->
<line x1="110" y1="200" x2="240" y2="200" stroke="black"></line>
<line x1="240" y1="200" x2="240" y2="470" stroke="black"></line>
<line x1="240" y1="470" x2="300" y2="470" stroke="black"></line>

<!-- VSS -->
<line x1="110" y1="320" x2="230" y2="320" stroke="blue"></line>
<line x1="230" y1="320" x2="230" y2="490" stroke="blue"></line>
<line x1="230" y1="490" x2="300" y2="490" stroke="blue"></line>

<!-- CS (separate clean path) -->
<line x1="350" y1="510" x2="350" y2="360" stroke="black"></line>
<line x1="350" y1="360" x2="650" y2="360" stroke="black"></line>
<line x1="650" y1="360" x2="650" y2="310" stroke="black"></line>
<line x1="650" y1="310" x2="700" y2="310" stroke="black"></line>

<!-- ========== GATE CONTROL (FIXED ROUTING) ========== -->

<!-- resistors -->
<rect x="550" y="430" width="40" height="15" fill="none" stroke="black"></rect>
<rect x="550" y="480" width="40" height="15" fill="none" stroke="black"></rect>

<!-- DO path (upper route) -->
<line x1="450" y1="450" x2="550" y2="437" stroke="black"></line>
<line x1="590" y1="437" x2="650" y2="437" stroke="black"></line>
<line x1="650" y1="437" x2="650" y2="140" stroke="black"></line>
<line x1="650" y1="140" x2="700" y2="140" stroke="black"></line>

<!-- CO path (lower route) -->
<line x1="450" y1="470" x2="550" y2="487" stroke="black"></line>
<line x1="590" y1="487" x2="680" y2="487" stroke="black"></line>
<line x1="680" y1="487" x2="680" y2="190" stroke="black"></line>
<line x1="680" y1="190" x2="700" y2="190" stroke="black"></line>

<!-- ========== CAPACITORS ========== -->
<line x1="200" y1="450" x2="200" y2="490" stroke="black"></line>
<line x1="190" y1="450" x2="210" y2="450" stroke="black"></line>
<line x1="190" y1="490" x2="210" y2="490" stroke="black"></line>

<line x1="180" y1="470" x2="180" y2="500" stroke="black"></line>
<line x1="170" y1="470" x2="190" y2="470" stroke="black"></line>
<line x1="170" y1="500" x2="190" y2="500" stroke="black"></line>

</svg>