<svg width="1000" height="650" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">

<!-- Title -->
<text x="20" y="25" font-size="18">2S LiPo Protection Circuit (KiCad-style reconstruction)</text>

<!-- ========== BATTERY CELLS ========== -->
<!-- Cell 1 -->
<line x1="100" y1="120" x2="100" y2="200" stroke="black"></line>
<line x1="120" y1="120" x2="120" y2="200" stroke="black"></line>
<text x="90" y="110">Cell 1</text>

<!-- Cell 2 -->
<line x1="100" y1="220" x2="100" y2="300" stroke="black"></line>
<line x1="120" y1="220" x2="120" y2="300" stroke="black"></line>
<text x="90" y="210">Cell 2</text>

<!-- Nodes -->
<circle cx="110" cy="100" r="3" fill="black"></circle>
<text x="120" y="105">B+</text>

<circle cx="110" cy="210" r="3" fill="black"></circle>
<text x="120" y="215">BM</text>

<circle cx="110" cy="320" r="3" fill="black"></circle>
<text x="120" y="325">B-</text>

<!-- Wiring -->
<line x1="110" y1="100" x2="110" y2="120" stroke="black"></line>
<line x1="110" y1="200" x2="110" y2="220" stroke="black"></line>
<line x1="110" y1="300" x2="110" y2="320" stroke="black"></line>

<!-- ========== MOSFET (8205A) ========== -->
<!-- MOSFET 1 -->
<line x1="400" y1="120" x2="400" y2="200" stroke="black"></line>
<line x1="400" y1="160" x2="450" y2="160" stroke="black"></line>
<polygon points="450,150 470,160 450,170" fill="none" stroke="black"></polygon> <!-- diode -->
<text x="380" y="110">Q1</text>

<!-- MOSFET 2 (back-to-back) -->
<line x1="470" y1="120" x2="470" y2="200" stroke="black"></line>
<line x1="420" y1="180" x2="470" y2="180" stroke="black"></line>
<polygon points="420,170 400,180 420,190" fill="none" stroke="black"></polygon> <!-- reverse diode -->
<text x="480" y="110">Q2</text>

<text x="410" y="95">8205A (dual NMOS)</text>

<!-- Connection from battery -->
<line x1="110" y1="100" x2="400" y2="160" stroke="black"></line>

<!-- Output -->
<line x1="470" y1="160" x2="650" y2="160" stroke="black"></line>
<text x="660" y="165">P+</text>

<!-- ========== SENSE RESISTOR ========== -->
<rect x="500" y="300" width="60" height="20" fill="none" stroke="black"></rect>
<text x="505" y="315">Rsense</text>
<text x="505" y="330">(30B)</text>

<line x1="110" y1="320" x2="500" y2="310" stroke="black"></line>
<line x1="560" y1="310" x2="650" y2="310" stroke="black"></line>
<text x="660" y="315">P-</text>

<!-- ========== PROTECTION IC ========== -->
<rect x="250" y="360" width="200" height="150" fill="none" stroke="black"></rect>
<text x="260" y="380">U1 (2S Protection IC)</text>

<!-- Left pins -->
<text x="255" y="410">VDD</text>
<text x="255" y="430">VM</text>
<text x="255" y="450">VSS</text>
<text x="255" y="470">CS</text>

<!-- Right pins -->
<text x="410" y="410">DO</text>
<text x="410" y="430">CO</text>

<!-- Connections to battery -->
<line x1="110" y1="100" x2="250" y2="405" stroke="black"></line>
<line x1="110" y1="210" x2="250" y2="425" stroke="black"></line>
<line x1="110" y1="320" x2="250" y2="445" stroke="black"></line>

<!-- CS to Rsense -->
<line x1="350" y1="470" x2="500" y2="310" stroke="black"></line>

<!-- ========== GATE RESISTORS ========== -->
<rect x="450" y="400" width="40" height="15" fill="none" stroke="black"></rect>
<text x="455" y="412">R</text>

<rect x="450" y="430" width="40" height="15" fill="none" stroke="black"></rect>
<text x="455" y="442">R</text>

<!-- Gate connections -->
<line x1="410" y1="410" x2="450" y2="407" stroke="black"></line>
<line x1="410" y1="430" x2="450" y2="437" stroke="black"></line>

<line x1="490" y1="407" x2="400" y2="160" stroke="black"></line>
<line x1="490" y1="437" x2="470" y2="160" stroke="black"></line>

<!-- ========== CAPACITORS ========== -->
<!-- Cap 1 -->
<line x1="220" y1="420" x2="220" y2="450" stroke="black"></line>
<line x1="210" y1="420" x2="230" y2="420" stroke="black"></line>
<line x1="210" y1="450" x2="230" y2="450" stroke="black"></line>
<text x="200" y="440">C</text>

<!-- Cap 2 -->
<line x1="220" y1="380" x2="220" y2="410" stroke="black"></line>
<line x1="210" y1="380" x2="230" y2="380" stroke="black"></line>
<line x1="210" y1="410" x2="230" y2="410" stroke="black"></line>
<text x="200" y="395">C</text>

</svg>