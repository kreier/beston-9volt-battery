<svg width="1100" height="700" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">

<!-- Title -->
<text x="20" y="25" font-size="18">2S LiPo Protection Circuit (Color-Coded, Clean Layout)</text>

<!-- ========== BATTERY STACK ========== -->
<!-- Cells -->
<rect x="80" y="100" width="60" height="80" fill="none" stroke="black"></rect>
<text x="85" y="140">Cell 2</text>

<rect x="80" y="220" width="60" height="80" fill="none" stroke="black"></rect>
<text x="85" y="260">Cell 1</text>

<!-- Nodes -->
<circle cx="110" cy="80" r="3" fill="red"></circle>
<text x="120" y="85">B+</text>

<circle cx="110" cy="200" r="3" fill="black"></circle>
<text x="120" y="205">BM</text>

<circle cx="110" cy="320" r="3" fill="blue"></circle>
<text x="120" y="325">B-</text>

<!-- Connections between cells -->
<line x1="110" y1="80" x2="110" y2="100" stroke="red"></line>
<line x1="110" y1="180" x2="110" y2="200" stroke="black"></line>
<line x1="110" y1="300" x2="110" y2="320" stroke="blue"></line>

<!-- ========== MOSFET BLOCK ========== -->
<rect x="500" y="120" width="120" height="80" fill="none" stroke="black"></rect>
<text x="510" y="150">8205A</text>
<text x="510" y="170">Dual MOSFET</text>

<!-- Positive path -->
<line x1="110" y1="80" x2="300" y2="80" stroke="red"></line>
<line x1="300" y1="80" x2="300" y2="160" stroke="red"></line>
<line x1="300" y1="160" x2="500" y2="160" stroke="red"></line>

<line x1="620" y1="160" x2="800" y2="160" stroke="red"></line>
<text x="810" y="165">P+</text>

<!-- ========== NEGATIVE PATH WITH SENSE RESISTOR ========== -->
<rect x="500" y="300" width="60" height="20" fill="none" stroke="black"></rect>
<text x="505" y="315">Rsense</text>

<line x1="110" y1="320" x2="300" y2="320" stroke="blue"></line>
<line x1="300" y1="320" x2="300" y2="310" stroke="blue"></line>
<line x1="300" y1="310" x2="500" y2="310" stroke="blue"></line>

<line x1="560" y1="310" x2="800" y2="310" stroke="blue"></line>
<text x="810" y="315">P-</text>

<!-- ========== PROTECTION IC ========== -->
<rect x="300" y="400" width="200" height="150" fill="none" stroke="black"></rect>
<text x="310" y="420">U1 (2S Protection IC)</text>

<!-- Pin labels -->
<text x="310" y="450">VDD</text>
<text x="310" y="470">VM</text>
<text x="310" y="490">VSS</text>
<text x="310" y="510">CS</text>

<text x="450" y="450">DO</text>
<text x="450" y="470">CO</text>

<!-- IC connections -->
<!-- VDD -->
<line x1="110" y1="80" x2="250" y2="80" stroke="red"></line>
<line x1="250" y1="80" x2="250" y2="450" stroke="red"></line>
<line x1="250" y1="450" x2="300" y2="450" stroke="red"></line>

<!-- VM -->
<line x1="110" y1="200" x2="240" y2="200" stroke="black"></line>
<line x1="240" y1="200" x2="240" y2="470" stroke="black"></line>
<line x1="240" y1="470" x2="300" y2="470" stroke="black"></line>

<!-- VSS -->
<line x1="110" y1="320" x2="230" y2="320" stroke="blue"></line>
<line x1="230" y1="320" x2="230" y2="490" stroke="blue"></line>
<line x1="230" y1="490" x2="300" y2="490" stroke="blue"></line>

<!-- CS -->
<line x1="350" y1="510" x2="350" y2="310" stroke="black"></line>
<line x1="350" y1="310" x2="500" y2="310" stroke="black"></line>

<!-- ========== GATE CONTROL ========== -->
<!-- Resistors -->
<rect x="520" y="430" width="40" height="15" fill="none" stroke="black"></rect>
<rect x="520" y="460" width="40" height="15" fill="none" stroke="black"></rect>

<!-- DO -->
<line x1="450" y1="450" x2="520" y2="437" stroke="black"></line>
<line x1="560" y1="437" x2="560" y2="200" stroke="black"></line>
<line x1="560" y1="200" x2="560" y2="200" stroke="black"></line>

<!-- CO -->
<line x1="450" y1="470" x2="520" y2="467" stroke="black"></line>
<line x1="560" y1="467" x2="560" y2="120" stroke="black"></line>

<!-- Connect to MOSFET -->
<line x1="560" y1="200" x2="560" y2="200" stroke="black"></line>
<line x1="560" y1="120" x2="560" y2="120" stroke="black"></line>

<!-- ========== CAPACITORS ========== -->
<!-- Cap between VDD and VSS -->
<line x1="200" y1="450" x2="200" y2="490" stroke="black"></line>
<line x1="190" y1="450" x2="210" y2="450" stroke="black"></line>
<line x1="190" y1="490" x2="210" y2="490" stroke="black"></line>

<!-- Cap on VM -->
<line x1="180" y1="470" x2="180" y2="500" stroke="black"></line>
<line x1="170" y1="470" x2="190" y2="470" stroke="black"></line>
<line x1="170" y1="500" x2="190" y2="500" stroke="black"></line>

</svg>