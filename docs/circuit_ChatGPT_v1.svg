<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="monospace">

  <!-- Title -->
  <text x="20" y="30" font-size="20">2S LiPo Protection Circuit (Reconstructed)</text>

  <!-- Cells -->
  <rect x="50" y="100" width="80" height="120" fill="none" stroke="black"></rect>
  <text x="60" y="170">Cell 1</text>

  <rect x="50" y="240" width="80" height="120" fill="none" stroke="black"></rect>
  <text x="60" y="310">Cell 2</text>

  <!-- Battery nodes -->
  <circle cx="130" cy="100" r="4" fill="black"></circle>
  <text x="140" y="105">B+</text>

  <circle cx="130" cy="240" r="4" fill="black"></circle>
  <text x="140" y="245">BM</text>

  <circle cx="130" cy="360" r="4" fill="black"></circle>
  <text x="140" y="365">B-</text>

  <!-- Wires between cells -->
  <line x1="130" y1="100" x2="130" y2="240" stroke="black"></line>
  <line x1="130" y1="240" x2="130" y2="360" stroke="black"></line>

  <!-- MOSFET block -->
  <rect x="350" y="140" width="140" height="80" fill="none" stroke="black"></rect>
  <text x="360" y="180">8205A</text>
  <text x="360" y="200">Dual MOSFET</text>

  <!-- Output -->
  <line x1="490" y1="180" x2="650" y2="180" stroke="black"></line>
  <text x="660" y="185">P+</text>

  <!-- Sense resistor -->
  <rect x="500" y="300" width="60" height="20" fill="none" stroke="black"></rect>
  <text x="505" y="315">Rsense</text>
  <text x="505" y="330">(30B)</text>

  <!-- P- output -->
  <line x1="560" y1="310" x2="650" y2="310" stroke="black"></line>
  <text x="660" y="315">P-</text>

  <!-- Battery to MOSFET -->
  <line x1="130" y1="100" x2="350" y2="180" stroke="black"></line>

  <!-- Battery negative to Rsense -->
  <line x1="130" y1="360" x2="500" y2="310" stroke="black"></line>

  <!-- Protection IC -->
  <rect x="300" y="350" width="160" height="120" fill="none" stroke="black"></rect>
  <text x="310" y="380">U1 (2S Protection IC)</text>

  <!-- IC pins -->
  <text x="310" y="410">VDD (B+)</text>
  <text x="310" y="430">VM (BM)</text>
  <text x="310" y="450">VSS (B-)</text>
  <text x="310" y="470">CS</text>

  <text x="420" y="410">DO</text>
  <text x="420" y="430">CO</text>

  <!-- Connections to IC -->
  <line x1="130" y1="100" x2="300" y2="405" stroke="black"></line>
  <line x1="130" y1="240" x2="300" y2="425" stroke="black"></line>
  <line x1="130" y1="360" x2="300" y2="445" stroke="black"></line>

  <!-- CS to Rsense -->
  <line x1="380" y1="470" x2="500" y2="310" stroke="black"></line>

  <!-- Gate resistors -->
  <rect x="460" y="410" width="40" height="15" fill="none" stroke="black"></rect>
  <text x="462" y="422">R</text>

  <rect x="460" y="440" width="40" height="15" fill="none" stroke="black"></rect>
  <text x="462" y="452">R</text>

  <!-- Gate lines -->
  <line x1="420" y1="410" x2="460" y2="417" stroke="black"></line>
  <line x1="420" y1="430" x2="460" y2="447" stroke="black"></line>

  <line x1="500" y1="417" x2="350" y2="180" stroke="black"></line>
  <line x1="500" y1="447" x2="350" y2="180" stroke="black"></line>

  <!-- Capacitors -->
  <line x1="260" y1="420" x2="260" y2="450" stroke="black"></line>
  <line x1="250" y1="420" x2="270" y2="420" stroke="black"></line>
  <line x1="250" y1="450" x2="270" y2="450" stroke="black"></line>
  <text x="240" y="440">C</text>

  <line x1="260" y1="380" x2="260" y2="410" stroke="black"></line>
  <line x1="250" y1="380" x2="270" y2="380" stroke="black"></line>
  <line x1="250" y1="410" x2="270" y2="410" stroke="black"></line>
  <text x="240" y="395">C</text>

</svg>