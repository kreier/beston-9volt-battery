<svg width="1100" height="700" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">

<!-- Title -->
<text x="20" y="25" font-size="18">2S LiPo Protection Circuit (Final Clean Schematic)</text>

<!-- ========== BATTERY ========== -->
<rect x="80" y="100" width="60" height="80" fill="none" stroke="black"></rect>
<rect x="80" y="220" width="60" height="80" fill="none" stroke="black"></rect>

<circle cx="110" cy="80" r="3" fill="red"></circle>
<text x="120" y="85">B+</text>

<circle cx="110" cy="200" r="3" fill="black"></circle>
<text x="120" y="205">BM</text>

<circle cx="110" cy="320" r="3" fill="blue"></circle>
<text x="120" y="325">B-</text>

<line x1="110" y1="80" x2="110" y2="100" stroke="red"></line>
<line x1="110" y1="180" x2="110" y2="200" stroke="black"></line>
<line x1="110" y1="300" x2="110" y2="320" stroke="blue"></line>

<!-- ========== MOSFET ========== -->
<rect x="750" y="120" width="120" height="80" fill="none" stroke="black"></rect>
<text x="760" y="155">8205A</text>

<!-- Positive -->
<line x1="110" y1="80" x2="600" y2="80" stroke="red"></line>
<line x1="600" y1="80" x2="600" y2="160" stroke="red"></line>
<line x1="600" y1="160" x2="750" y2="160" stroke="red"></line>

<line x1="870" y1="160" x2="1000" y2="160" stroke="red"></line>
<text x="1010" y="165">P+</text>

<!-- ========== NEGATIVE ========== -->
<rect x="750" y="300" width="60" height="20" fill="none" stroke="black"></rect>
<text x="755" y="295">Rsense</text>

<line x1="110" y1="320" x2="600" y2="320" stroke="blue"></line>
<line x1="600" y1="320" x2="600" y2="310" stroke="blue"></line>
<line x1="600" y1="310" x2="750" y2="310" stroke="blue"></line>

<line x1="810" y1="310" x2="1000" y2="310" stroke="blue"></line>
<text x="1010" y="315">P-</text>

<!-- ========== IC ========== -->
<rect x="300" y="400" width="200" height="150" fill="none" stroke="black"></rect>
<text x="310" y="420">U1 (2S Protection IC)</text>

<text x="310" y="450">VDD</text>
<text x="310" y="470">VM</text>
<text x="310" y="490">VSS</text>
<text x="310" y="510">CS</text>

<text x="450" y="450">DO</text>
<text x="450" y="470">CO</text>

<!-- VDD -->
<line x1="110" y1="80" x2="260" y2="80" stroke="red"></line>
<line x1="260" y1="80" x2="260" y2="450" stroke="red"></line>
<line x1="260" y1="450" x2="300" y2="450" stroke="red"></line>

<!-- VM -->
<line x1="110" y1="200" x2="240" y2="200" stroke="black"></line>
<line x1="240" y1="200" x2="240" y2="470" stroke="black"></line>
<line x1="240" y1="470" x2="300" y2="470" stroke="black"></line>

<!-- VSS -->
<line x1="110" y1="320" x2="220" y2="320" stroke="blue"></line>
<line x1="220" y1="320" x2="220" y2="490" stroke="blue"></line>
<line x1="220" y1="490" x2="300" y2="490" stroke="blue"></line>

<!-- CS (DEDICATED ROUTE, no overlap) -->
<line x1="350" y1="510" x2="350" y2="560" stroke="black"></line>
<line x1="350" y1="560" x2="700" y2="560" stroke="black"></line>
<line x1="700" y1="560" x2="700" y2="310" stroke="black"></line>
<line x1="700" y1="310" x2="750" y2="310" stroke="black"></line>

<!-- ========== RESISTORS ========== -->
<!-- R1 -->
<rect x="600" y="430" width="40" height="15" fill="none" stroke="black"></rect>
<text x="605" y="425">R1</text>

<!-- R2 -->
<rect x="600" y="480" width="40" height="15" fill="none" stroke="black"></rect>
<text x="605" y="475">R2</text>

<!-- DO -->
<line x1="450" y1="450" x2="600" y2="437" stroke="black"></line>
<line x1="640" y1="437" x2="720" y2="437" stroke="black"></line>
<line x1="720" y1="437" x2="720" y2="140" stroke="black"></line>
<line x1="720" y1="140" x2="750" y2="140" stroke="black"></line>

<!-- CO -->
<line x1="450" y1="470" x2="600" y2="487" stroke="black"></line>
<line x1="640" y1="487" x2="740" y2="487" stroke="black"></line>
<line x1="740" y1="487" x2="740" y2="190" stroke="black"></line>
<line x1="740" y1="190" x2="750" y2="190" stroke="black"></line>

<!-- ========== CAPACITORS ========== -->
<!-- C1 -->
<line x1="180" y1="450" x2="180" y2="490" stroke="black"></line>
<line x1="170" y1="450" x2="190" y2="450" stroke="black"></line>
<line x1="170" y1="490" x2="190" y2="490" stroke="black"></line>
<text x="150" y="470">C1</text>

<!-- C2 -->
<line x1="200" y1="470" x2="200" y2="510" stroke="black"></line>
<line x1="190" y1="470" x2="210" y2="470" stroke="black"></line>
<line x1="190" y1="510" x2="210" y2="510" stroke="black"></line>
<text x="215" y="495">C2</text>

</svg>